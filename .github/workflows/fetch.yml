name: Sitemap-Snapshot holen
on:
  schedule:
    # zweimal täglich (UTC) — Redundanz, falls GitHub einen Lauf verzögert/auslässt
    - cron: '30 4 * * *'
    - cron: '30 14 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sitemap abrufen
        run: |
          ts=$(TZ=Europe/Berlin date +%Y-%m-%d-%H%M)
          mkdir -p snapshots
          out="snapshots/article-news-sitemap-$ts.xml"
          curl -sf --max-time 60 -A "Mozilla/5.0 (compatible; msg-sitemap-archive)" \
            "https://www.mein-schoener-garten.de/article-news-sitemap.xml" -o "$out"
          grep -q "sitemap-news" "$out"   # Plausibilitätscheck
          echo "TS=$ts" >> "$GITHUB_ENV"
      - name: Committen
        run: |
          git config user.name "sitemap-bot"
          git config user.email "actions@users.noreply.github.com"
          git add snapshots
          git commit -m "Snapshot $TS"
          git push
